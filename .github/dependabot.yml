version: 2
updates:
  # Enable version updates for Python dependencies
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "mustafagomaa"
    assignees:
      - "mustafagomaa"
    commit-message:
      prefix: "⬆️"
      include: "scope"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/compose"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "mustafagomaa"
    assignees:
      - "mustafagomaa"
    commit-message:
      prefix: "🐳"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "mustafagomaa"
    assignees:
      - "mustafagomaa"
    commit-message:
      prefix: "🔧"
      include: "scope"

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Pre-commit checks

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pre-commit
      uses: actions/cache@v3
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ runner.os }}-

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit
      run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    name: Run tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('**/requirements/local.txt') }}
        restore-keys: |
          pip-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/local.txt

    - name: Run Django system checks
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        CELERY_BROKER_URL: redis://localhost:6379/0
        REDIS_URL: redis://localhost:6379/0
      run: python manage.py check --settings=config.settings.test

    - name: Run migrations
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        CELERY_BROKER_URL: redis://localhost:6379/0
        REDIS_URL: redis://localhost:6379/0
      run: python manage.py migrate --settings=config.settings.test

    - name: Run tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        CELERY_BROKER_URL: redis://localhost:6379/0
        REDIS_URL: redis://localhost:6379/0
      run: |
        coverage run -m pytest
        coverage report --show-missing
        coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    name: Build Docker images
    needs: [pre-commit, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Django image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./compose/local/django/Dockerfile
        push: false
        tags: nodefinder-django:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker Compose
      run: |
        # Create minimal .envs structure for testing
        mkdir -p .envs/.local
        echo "POSTGRES_HOST=postgres" > .envs/.local/.postgres
        echo "POSTGRES_PORT=5432" >> .envs/.local/.postgres
        echo "POSTGRES_DB=nodefinder" >> .envs/.local/.postgres
        echo "POSTGRES_USER=debug" >> .envs/.local/.postgres
        echo "POSTGRES_PASSWORD=debug" >> .envs/.local/.postgres

        echo "REDIS_URL=redis://redis:6379/0" > .envs/.local/.django
        echo "CELERY_BROKER_URL=redis://redis:6379/0" >> .envs/.local/.django

        # Test that docker-compose builds successfully
        docker-compose -f docker-compose.local.yml config

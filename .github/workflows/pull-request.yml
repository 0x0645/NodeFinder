name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    name: Code Quality & Safety

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Fetch full history for better diffs
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Cache pre-commit
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit on changed files
      run: |
        # Run pre-commit only on changed files for faster feedback
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD
        else
          pre-commit run --all-files
        fi

    - name: Check for security issues
      run: |
        pip install bandit safety
        # Check for security vulnerabilities in dependencies
        safety check --json || true
        # Check for common security issues in code
        bandit -r . -f json -x "./venv/*,./env/*,**/migrations/*" || true

  quick-test:
    runs-on: ubuntu-latest
    name: Quick Tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/local.txt

    - name: Run Django checks
      env:
        DATABASE_URL: sqlite:///test.db
        CELERY_BROKER_URL: memory://localhost/
        REDIS_URL: memory://localhost/
      run: |
        python manage.py check --settings=config.settings.test
        python manage.py collectstatic --noinput --settings=config.settings.test

    - name: Run fast tests
      env:
        DATABASE_URL: sqlite:///test.db
        CELERY_BROKER_URL: memory://localhost/
        REDIS_URL: memory://localhost/
      run: |
        # Run only fast tests for quick feedback
        python -m pytest nodes/tests.py -x -v --tb=short
